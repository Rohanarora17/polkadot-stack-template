name: Keep StealthPay Relayer Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping relayer warmup endpoint
        env:
          RELAYER_URL: ${{ vars.STEALTHPAY_RELAYER_URL || 'https://stealthpay-relayer.onrender.com' }}
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --max-time 60 "$RELAYER_URL/warmup"
