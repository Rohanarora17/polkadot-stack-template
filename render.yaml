services:
  - type: web
    name: stealthpay-relayer
    runtime: node
    plan: starter
    rootDir: relayer
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /health
    disk:
      name: stealthpay-indexer-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: STEALTHPAY_INDEXER_ENABLED
        value: "true"
      - key: STEALTHPAY_INDEXER_LOOKBACK_BLOCKS
        value: "30000"
      - key: STEALTHPAY_INDEXER_MAX_BLOCKS_PER_CYCLE
        value: "1000"
      - key: STEALTHPAY_INDEXER_DATA_FILE
        value: /var/data/stealthpay-indexer.json
      - key: STEALTHPAY_INDEXER_WS
        value: wss://asset-hub-paseo-rpc.n.dwellir.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: RELAYER_PRIVATE_KEY
        sync: false
      - key: BULLETIN_SIGNER_MNEMONIC
        sync: false
